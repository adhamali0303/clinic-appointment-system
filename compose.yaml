services:
  postgres:
    image: 'postgres:latest'
    container_name: clinic-postgres
    environment:
      - POSTGRES_DB=clinic_db
      - POSTGRES_PASSWORD=clinic_password
      - POSTGRES_USER=clinic_user
    ports:
      - '5433:5432' #
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data: