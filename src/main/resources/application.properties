spring.application.name=clinic-appointment-system

# PostgreSQL Connection Settings
# Overridable via env vars (e.g. in docker-compose.yml) - defaults below match
# local/manual dev against the root compose.yaml's postgres container.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/clinic_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:clinic_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:clinic_password}
spring.flyway.baseline-on-migrate=true
spring.liquibase.enabled=false
spring.datasource.driver-class-name=org.postgresql.Driver
# Demo default only - override via JWT_SECRET in any real deployment.
jwt.secret=${JWT_SECRET:9a4f2c8d3b7a1e5f6c8d9a0b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# JPA & Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# springdoc-openapi Settings
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
