spring.application.name=clinic-appointment-system

# PostgreSQL Connection Settings
spring.datasource.url=jdbc:postgresql://localhost:5433/clinic_db
spring.datasource.username=clinic_user
spring.datasource.password=clinic_password
spring.flyway.baseline-on-migrate=true
spring.liquibase.enabled=false
spring.datasource.driver-class-name=org.postgresql.Driver
jwt.secret=9a4f2c8d3b7a1e5f6c8d9a0b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d
jwt.expiration-ms=86400000

# JPA & Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect